name: build

on:
  push:
    paths:
      - '**.go'
      - 'go.mod'
      - 'build.yml'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ^1.26

      - name: Build
        run: go build

      - name: Test
        run: go test -coverprofile=coverage.txt -covermode=atomic -v ./...
